<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - ASESS</title>
    <meta name="description" content="Sign in to access your ASESS dashboard for eye screening and analysis.">
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/auth.css" />
    <link rel="stylesheet" href="/css/components.css" />
</head>
<body class="auth-bg">
    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to access your ASESS dashboard</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="name@clinic.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required />
                </div>

                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <p class="footer-text">Don't have an account? <a href="/register">Create one</a></p>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
