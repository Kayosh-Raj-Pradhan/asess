<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - ASESS</title>
    <meta name="description" content="ASESS Admin Panel - Manage users and system settings.">
    <link rel="icon" href="/assets/images/logo.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/pages.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/admin.css" />
    <link rel="stylesheet" href="/css/components.css" />
</head>
<body class="bg-dashboard">
    <div id="main-wrapper">
        <div id="header-placeholder"></div>

        <main class="dashboard-main">
            <section class="card">
                <h2>Admin Panel</h2>
                <p class="muted">Manage all registered users. Only accessible to administrators.</p>
            </section>

            <section class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
                    <h3 style="margin:0;">User Management</h3>
                    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                        <input type="text" id="adminSearchInput" class="search-input" placeholder="🔍 Search users..." oninput="filterAdminTable()">
                        <button class="btn btn-primary" style="padding:8px 20px; font-size:0.9rem; background:#16a34a;" onclick="openCreateUserModal()">+ Create User</button>
                        <a href="/index" class="btn btn-primary" style="padding:8px 20px; font-size:0.9rem;">← Back to Dashboard</a>
                    </div>
                </div>
                <div style="overflow-x: auto;">
                    <table class="history-table admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Full Name</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="adminUserTable">
                            <tr><td colspan="7" style="text-align:center; color:#94a3b8;">Loading users...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <div id="footer-placeholder"></div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
