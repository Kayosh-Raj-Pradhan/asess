<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASESS | Eye Test Report</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/pages.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body class="bg-report">
    <div id="main-wrapper">
        <div id="header-placeholder"></div>

        <div class="container page-container">
            <div id="reportContent">
                <p style="color:var(--card-para); text-align:center; padding:40px;">Loading report...</p>
            </div>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/toast.js"></script>
    <script src="/static/js/script.js"></script>
    <script>
        function loadReport() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const history = JSON.parse(localStorage.getItem('eyeTestHistory') || '[]');
            const entry = history.find(e => e.id === id);
            const container = document.getElementById('reportContent');

            if (!entry) {
                container.innerHTML = `
                    <div class="card" style="text-align:center; padding:48px;">
                        <p style="font-size:2rem; margin-bottom:12px;">⚠️</p>
                        <h3 style="margin-bottom:12px;">Report Not Found</h3>
                        <p style="color:var(--card-para); margin-bottom:20px;">This eye test report could not be found.</p>
                        <a href="/static/history.html" class="btn btn-primary" style="padding:10px 28px;">← Back to History</a>
                    </div>`;
                return;
            }

            const ish = entry.ishihara || {};
            const sn = entry.snellen || {};
            const ct = entry.contrast || {};

            // Overall issues
            const issues = entry.overallIssues || [];
            let overallHtml = '';
            if (issues.length === 0) {
                overallHtml = '<p class="text-success" style="font-weight:700;">All tests within normal range. No immediate concerns detected.</p>';
            } else {
                overallHtml = '<ul style="padding-left:20px;">' +
                    issues.map(i => '<li class="text-warning" style="margin-bottom:6px;">' + i + '</li>').join('') +
                    '</ul><p style="margin-top:12px; color:var(--card-para);">Recommend follow-up with an ophthalmologist for further evaluation.</p>';
            }

            container.innerHTML = `
                <!-- Header -->
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:20px;">
                        <h2 style="margin:0;">📋 Eye Test Report</h2>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-primary" onclick="window.print()" style="padding:8px 20px; font-size:0.9rem;">🖨️ Print Report</button>
                            <a href="/static/history.html" class="btn btn-primary" style="padding:8px 20px; font-size:0.9rem; background:var(--card-bg); border:1px solid rgba(171,209,198,0.3);">← Back to History</a>
                        </div>
                    </div>
                    <div class="detail-row"><span class="detail-label">Patient Name</span><span class="detail-value">${entry.patientName}</span></div>
                    <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${entry.date}</span></div>
                    <div class="detail-row"><span class="detail-label">Screened By</span><span class="detail-value">${entry.screenedBy}</span></div>
                </div>

                <!-- Ishihara -->
                <div class="card">
                    <h3>1. Color Vision (Ishihara)</h3>
                    <div style="color:var(--card-para);">
                        ${ish.correct !== undefined
                            ? `<p>Plates Correct: <strong>${ish.correct}/${ish.total}</strong> (${ish.pct}%)</p>
                               <p>Status: <strong class="${ish.status === 'Normal' ? 'text-success' : 'text-danger'}">${ish.status}</strong></p>`
                            : '<p class="text-warning">Test not completed</p>'}
                    </div>
                </div>

                <!-- Snellen -->
                <div class="card">
                    <h3>2. Visual Acuity (Snellen)</h3>
                    <div style="color:var(--card-para);">
                        ${sn.acuity
                            ? `<p>Best Acuity: <strong>${sn.acuity}</strong></p>
                               <p>Status: <strong class="${sn.status === 'Normal' ? 'text-success' : 'text-warning'}">${sn.status}</strong></p>`
                            : '<p class="text-warning">Test not completed</p>'}
                    </div>
                </div>

                <!-- Contrast -->
                <div class="card">
                    <h3>3. Contrast Sensitivity</h3>
                    <div style="color:var(--card-para);">
                        ${ct.levelsDetected !== undefined
                            ? `<p>Levels Detected: <strong>${ct.levelsDetected}/${ct.total}</strong> (${ct.pct}%)</p>
                               <p>Status: <strong class="${ct.status === 'Normal' ? 'text-success' : 'text-warning'}">${ct.status}</strong></p>`
                            : '<p class="text-warning">Test not completed</p>'}
                    </div>
                </div>

                <!-- Overall -->
                <div class="card">
                    <h3>Overall Assessment</h3>
                    <div style="color:var(--card-para);">${overallHtml}</div>
                </div>

                <!-- Doctor's Notes -->
                <div class="card">
                    <h3>Doctor's Notes</h3>
                    <div style="color:var(--card-para);">
                        ${entry.doctorNotes
                            ? `<p style="white-space:pre-wrap; line-height:1.7;">${entry.doctorNotes}</p>`
                            : '<p style="color:rgba(171,209,198,0.5); font-style:italic;">No notes were added for this test.</p>'}
                    </div>
                </div>

                <!-- Delete -->
                <div style="text-align:center; margin-top:12px;">
                    <button class="btn" style="background:var(--tertiary); color:#fff; padding:10px 24px; font-size:0.9rem;" onclick="deleteReport(${entry.id})">🗑️ Delete This Report</button>
                </div>
            `;
        }

        function deleteReport(id) {
            if (!confirm('Are you sure you want to delete this eye test report?')) return;
            let history = JSON.parse(localStorage.getItem('eyeTestHistory') || '[]');
            history = history.filter(e => e.id !== id);
            localStorage.setItem('eyeTestHistory', JSON.stringify(history));
            window.location.href = '/static/history.html';
        }

        loadReport();
    </script>
</body>
</html>
