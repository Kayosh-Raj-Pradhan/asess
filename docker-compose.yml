services:
  backend:
    build: ./backend
    container_name: asess-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    command: uvicorn asess.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    container_name: asess-db
    restart: always
    environment:
      POSTGRES_USER: asessuser
      POSTGRES_PASSWORD: asesspassword
      POSTGRES_DB: asess_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: