services:
  frontend:
    build: ./frontend
    container_name: asess-frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: asess-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: asess-db
    restart: always
    environment:
      POSTGRES_USER: asessuser
      POSTGRES_PASSWORD: asesspassword
      POSTGRES_DB: asess_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: